version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gym_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gymsys_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/database/gymsys_db.sql:/docker-entrypoint-initdb.d/gymsys_db.sql
    networks:
      - gym_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: gym_backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost:8000
      DB_HOST: mysql
      DB_DATABASE: gymsys_db
      DB_USERNAME: root
      DB_PASSWORD: root
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: marcojeandev@gmail.com
      MAIL_PASSWORD: "slfs cdrc nzik iatw"
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: marcojeandev@gmail.com
      MAIL_FROM_NAME: "Gym Management"
    volumes:
      - backend_storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gym_network

  backend_nginx:
    image: nginx:alpine
    container_name: gym_backend_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./Backend:/var/www
      - ./nginx-backend.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - gym_network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - gym_network

  redis:
    image: redis:alpine
    container_name: gym_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gym_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gym_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - gym_network

networks:
  gym_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_storage: